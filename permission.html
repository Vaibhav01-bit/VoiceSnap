<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VoiceSnap Permissions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent-cyan: #22d3ee;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-primary);
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            background: linear-gradient(to right, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
            font-size: 16px;
        }

        button {
            background-color: var(--accent-cyan);
            color: var(--bg-dark);
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.5);
        }

        #status {
            margin-top: 24px;
            font-weight: 600;
            font-size: 14px;
        }

        .success {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Microphone Required</h1>
        <p>VoiceSnap uses your microphone to listen for commands. Click below to grant access and start your hands-free
            workflow.</p>
        <button id="grant-btn">Grant Microphone Access</button>
        <div id="status"></div>
    </div>
    <script src="permission.js"></script>
</body>

</html>
