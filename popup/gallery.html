<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VoiceSnap Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #041321;
            --panel: rgba(9, 23, 38, 0.86);
            --line: rgba(125, 211, 252, 0.14);
            --line-strong: rgba(125, 211, 252, 0.28);
            --text: #e0f2fe;
            --muted: #89a6bf;
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 28px;
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 34%),
                linear-gradient(180deg, #03111d 0%, #041827 100%);
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        .page {
            display: grid;
            gap: 18px;
        }

        .hero,
        .panel,
        .card {
            border-radius: 22px;
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: 0 22px 44px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(14px);
        }

        .hero {
            display: grid;
            gap: 18px;
            padding: 22px;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: start;
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        h1 {
            font-size: 30px;
            line-height: 1;
        }

        .subtle {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .hero-actions,
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn,
        .chip,
        .action {
            border: 1px solid var(--line);
            background: rgba(4, 19, 33, 0.72);
            color: var(--text);
            cursor: pointer;
            font: inherit;
        }

        .btn {
            border-radius: 999px;
            padding: 10px 14px;
        }

        .btn:hover,
        .chip:hover,
        .action:hover {
            border-color: var(--line-strong);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .stat {
            padding: 14px;
            border-radius: 18px;
            background: rgba(4, 19, 33, 0.72);
            border: 1px solid var(--line);
        }

        .stat-label {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .stat-value {
            margin-top: 8px;
            font-size: 28px;
            font-weight: 700;
        }

        .panel {
            padding: 18px;
            display: grid;
            gap: 14px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1.5fr auto;
            gap: 12px;
        }

        .search {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(4, 19, 33, 0.72);
            color: var(--text);
            padding: 13px 16px;
            outline: none;
        }

        .search:focus {
            border-color: var(--line-strong);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
        }

        .chip {
            border-radius: 999px;
            padding: 9px 13px;
        }

        .chip.active {
            border-color: rgba(56, 189, 248, 0.34);
            background: rgba(56, 189, 248, 0.12);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            padding: 12px;
            display: grid;
            gap: 12px;
        }

        .thumb {
            width: 100%;
            aspect-ratio: 16 / 10;
            border-radius: 16px;
            object-fit: cover;
            background: rgba(4, 19, 33, 0.72);
        }

        .title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.35;
        }

        .meta,
        .url {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .pill-row,
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 5px 8px;
            border-radius: 999px;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(125, 211, 252, 0.18);
            color: #bae6fd;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .action {
            padding: 8px 11px;
            border-radius: 999px;
            font-size: 12px;
        }

        .action.favorite {
            color: #facc15;
        }

        .empty {
            padding: 28px;
            text-align: center;
            border-radius: 20px;
            border: 1px dashed rgba(125, 211, 252, 0.22);
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 820px) {
            body {
                padding: 16px;
            }

            .stats,
            .toolbar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="hero">
            <div class="hero-top">
                <div>
                    <div class="eyebrow">Capture library</div>
                    <h1>VoiceSnap Gallery</h1>
                    <p class="subtle">Search, filter, favorite, reopen, edit, and clean up captures from one place.</p>
                </div>
                <div class="hero-actions">
                    <button class="btn" id="open-popup" type="button">Back to popup</button>
                    <button class="btn" id="clear-all" type="button">Clear all</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">All captures</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Favorites</div>
                    <div class="stat-value" id="stat-favorites">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Today</div>
                    <div class="stat-value" id="stat-today">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Edited</div>
                    <div class="stat-value" id="stat-edited">0</div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="toolbar">
                <input class="search" id="search" type="search" placeholder="Search title, URL, mode, or label..." />
                <div class="filters" id="filters">
                    <button class="chip active" data-filter="all" type="button">All</button>
                    <button class="chip" data-filter="today" type="button">Today</button>
                    <button class="chip" data-filter="favorites" type="button">Favorites</button>
                    <button class="chip" data-filter="edited" type="button">Edited</button>
                </div>
            </div>
        </section>

        <section>
            <div class="grid" id="grid"></div>
            <div class="empty" id="empty" style="display:none;">No screenshots match this filter yet.</div>
        </section>
    </main>

    <script type="module" src="gallery.js"></script>
</body>

</html>
