<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VoiceSnap Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #020617;
            color: #e5e7eb;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 20px;
            background: linear-gradient(to right, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 16px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }
        .search {
            flex: 1;
            position: relative;
        }
        .search input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid #1f2937;
            background: #020617;
            color: #e5e7eb;
            font-size: 12px;
            outline: none;
        }
        .search input:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 1px rgba(34,211,238,0.4);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        .card {
            background: rgba(15,23,42,0.9);
            border-radius: 12px;
            border: 1px solid rgba(31,41,55,0.9);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }
        .thumb {
            width: 100%;
            border-radius: 8px;
            max-height: 140px;
            object-fit: cover;
        }
        .meta-title {
            font-size: 12px;
            font-weight: 600;
            color: #e5e7eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .meta-url {
            font-size: 11px;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .meta-time {
            font-size: 10px;
            color: #6b7280;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
        }
        .actions button {
            font-size: 10px;
            border-radius: 999px;
            border: 1px solid rgba(55,65,81,0.9);
            background: #020617;
            color: #e5e7eb;
            padding: 3px 0;
            cursor: pointer;
        }
        .actions button:hover {
            border-color: #22d3ee;
        }
        .empty {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <h1>VoiceSnap Gallery</h1>
    <div class="sub">Browse, copy, download, or edit your recent screenshots.</div>
    <div class="top-bar">
        <div class="search">
            <input id="search" type="text" placeholder="Search by title or URL...">
        </div>
    </div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">No screenshots yet. Capture something with VoiceSnap to see it here.</div>

    <script type="module" src="gallery.js"></script>
</body>
</html>
