<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="popup.js" type="module"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="tailwind.css" rel="stylesheet">
    <style>
        body {
            width: 350px;
            height: 580px;
            min-width: 350px;
            min-height: 580px;
            margin: 0;
            overflow: hidden;
            background-color: #020617;
            /* Essential for dark theme even if CSS is slow */
        }
    </style>
</head>

<body class="dark">
    <div
        class="relative flex h-full w-full flex-col bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
        <!-- Header -->
        <div class="flex items-center justify-between px-5 pt-6 pb-4">
            <div class="flex items-center gap-2">
                <div
                    class="size-8 rounded-lg bg-gradient-to-br from-primary to-purple-500 flex items-center justify-center shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-white text-xl">mic</span>
                </div>
                <h2 class="text-xl font-bold tracking-tight neon-text">VoiceSnap</h2>
            </div>
            <div id="status-badge"
                class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-primary/10 border border-primary/20 transition-all duration-300">
                <span id="status-dot" class="size-2 rounded-full bg-primary transition-all duration-300"></span>
                <p id="status-text" class="text-[10px] font-bold uppercase tracking-wider text-primary">Ready</p>
            </div>
        </div>
        <!-- Main Voice Interaction Area -->
        <div class="flex flex-col items-center justify-center flex-1 px-6">
            <div id="mic-btn" class="relative group cursor-pointer w-32 h-32 flex items-center justify-center">
                <!-- Glow Aura -->
                <div id="mic-aura"
                    class="absolute -inset-4 rounded-full bg-primary/20 blur-2xl opacity-50 group-hover:opacity-80 transition-opacity duration-300">
                </div>
                <div
                    class="absolute -inset-1 rounded-full bg-gradient-to-r from-primary to-purple-500 opacity-30 blur-md">
                </div>
                <!-- Glass Mic Button -->
                <div id="mic-indicator"
                    class="relative size-32 rounded-full glass flex items-center justify-center neon-glow border-white/20 transition-all duration-300 group-hover:scale-105">
                    <div
                        class="size-24 rounded-full bg-slate-900/40 flex items-center justify-center border border-white/5 transition-all duration-300">
                        <span
                            class="material-symbols-outlined text-5xl text-primary drop-shadow-[0_0_10px_rgba(13,185,242,0.8)] transition-all duration-300"
                            style="font-variation-settings: 'FILL' 1">mic</span>
                    </div>
                </div>
            </div>
            <p class="mt-8 text-sm font-medium text-slate-400 dark:text-slate-400 flex items-center gap-2">
                Voice mode: say <span class="text-primary font-bold">"Hey Snap"</span>...
            </p>
            <div id="error-msg" class="w-full mt-4 text-center text-xs text-red-400 hidden"></div>
        </div>
        <!-- Recent Captures Section -->
        <div class="px-5 pb-4">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-bold text-slate-100 uppercase tracking-widest opacity-70">Recent Captures</h3>
                <button id="clear-history"
                    class="text-[11px] font-bold text-primary/80 hover:text-primary transition-colors uppercase tracking-wider">Clear</button>
            </div>
            <div id="history-grid" class="flex gap-3 overflow-x-auto pb-2 no-scrollbar" style="height: 72px;">
                <!-- Rendered via JS -->
                <div
                    class="w-full h-16 rounded-lg glass border-white/10 flex justify-center items-center text-slate-400 text-[11px] border-dashed">
                    No captures yet</div>
            </div>
        </div>
        <!-- Common Commands Section -->
        <div class="px-5 pb-8">
            <h3 class="text-xs font-bold text-slate-100 uppercase tracking-widest opacity-70 mb-3">Common Commands</h3>
            <div class="flex flex-wrap gap-2">
                <div data-command="take screenshot"
                    class="command-tag px-3 py-1.5 rounded-full glass border-white/5 text-[11px] font-medium text-slate-300 hover:bg-white/10 hover:text-primary cursor-pointer transition-all">
                    "Take screenshot"
                </div>
                <div data-command="capture left side"
                    class="command-tag px-3 py-1.5 rounded-full glass border-white/5 text-[11px] font-medium text-slate-300 hover:bg-white/10 hover:text-primary cursor-pointer transition-all">
                    "Capture left side"
                </div>
                <div data-command="show gallery"
                    class="command-tag px-3 py-1.5 rounded-full glass border-white/5 text-[11px] font-medium text-slate-300 hover:bg-white/10 hover:text-primary cursor-pointer transition-all">
                    "Show gallery"
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="popup.js"></script>
</body>

</html>
