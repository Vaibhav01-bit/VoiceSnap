  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0db9f2",
            "background-light": "#f5f8f8",
            "background-dark": "#020617", // slate-950
          },
          fontFamily: {
            "display": ["Space Grotesk"]
          },
          borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        },
      },
    }

  <style>
    body {
      width: 350px;
      height: 600px;
      margin: 0;
      overflow: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .neon-glow {
      box-shadow: 0 0 20px rgba(13, 185, 242, 0.3);
    }

    .neon-text {
      background: linear-gradient(90deg, #0db9f2, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

        </div>
        <h2 class="text-xl font-bold tracking-tight neon-text">VoiceSnap</h2>

    </div>

              style="font-variation-settings: 'FILL' 1">mic</span>

        </div>
      </div>
