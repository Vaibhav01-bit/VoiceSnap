<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceSnap Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { color-scheme: dark; --panel: rgba(9, 23, 38, 0.88); --line: rgba(125, 211, 252, 0.16); --line-strong: rgba(125, 211, 252, 0.32); --text: #e0f2fe; --muted: #89a6bf; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: 'Space Grotesk', 'Segoe UI', sans-serif; color: var(--text); background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 34%), linear-gradient(180deg, #03111d 0%, #041827 100%); }
        .page { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; gap: 18px; padding: 18px; }
        .panel { border-radius: 22px; border: 1px solid var(--line); background: rgba(9, 23, 38, 0.88); box-shadow: 0 22px 44px rgba(0, 0, 0, 0.32); backdrop-filter: blur(14px); }
        .header { padding: 18px 20px; display: grid; gap: 14px; }
        .header-top { display: flex; justify-content: space-between; gap: 16px; align-items: start; }
        .eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
        h1, p { margin: 0; }
        h1 { font-size: 30px; line-height: 1.05; }
        .subtle { color: var(--muted); font-size: 13px; line-height: 1.5; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { border: 1px solid var(--line); background: rgba(4, 19, 33, 0.72); color: var(--text); cursor: pointer; font: inherit; border-radius: 999px; padding: 10px 14px; }
        .btn:hover { border-color: var(--line-strong); }
        .viewer { padding: 18px; display: grid; place-items: center; }
        .frame { width: 100%; min-height: 420px; border-radius: 22px; border: 1px solid var(--line); background: linear-gradient(45deg, rgba(15, 23, 42, 0.7) 25%, transparent 25%), linear-gradient(-45deg, rgba(15, 23, 42, 0.7) 25%, transparent 25%), linear-gradient(45deg, transparent 75%, rgba(15, 23, 42, 0.7) 75%), linear-gradient(-45deg, transparent 75%, rgba(15, 23, 42, 0.7) 75%), rgba(4, 19, 33, 0.82); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0; overflow: auto; display: grid; place-items: center; padding: 18px; }
        .frame img { display: block; max-width: 100%; max-height: calc(100vh - 220px); border-radius: 18px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.42); }
        .empty { padding: 28px; text-align: center; border-radius: 20px; border: 1px dashed rgba(125, 211, 252, 0.22); color: var(--muted); font-size: 14px; line-height: 1.6; }
        @media (max-width: 820px) { .header-top { flex-direction: column; } }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel header">
            <div class="header-top">
                <div>
                    <div class="eyebrow">Image preview</div>
                    <h1 id="title">Loading preview...</h1>
                    <p class="subtle" id="meta">Preparing capture metadata</p>
                </div>
                <div class="actions">
                    <button class="btn" id="copy-btn" type="button">Copy</button>
                    <button class="btn" id="download-btn" type="button">Download</button>
                    <button class="btn" id="edit-btn" type="button">Edit</button>
                    <button class="btn" id="open-page-btn" type="button">Open page</button>
                </div>
            </div>
        </section>
        <section class="panel viewer">
            <div class="frame">
                <div class="empty" id="empty">Loading screenshot preview...</div>
                <img id="image" alt="Screenshot preview" hidden />
            </div>
        </section>
    </main>
    <script type="module" src="viewer.js"></script>
</body>
</html>
